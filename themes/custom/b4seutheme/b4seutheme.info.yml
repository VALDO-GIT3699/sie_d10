name: 'B4 SEUtheme'
type: theme
description: 'B4 SEUtheme subtheme based on Bootstrap 4 theme.'
core_version_requirement: '^9 || ^10'
'base theme': bootstrap4
libraries:
  - b4seutheme/global-styling
  - b4seutheme/global-scripts
stylesheets-remove:
  - '@bootstrap4/css/style.css'
  - '@bootstrap4/css/custom.css'
  - '@bootstrap4/fontawesome/css/fontawesome.css'
regions:
  header: Header
  nav_branding: 'Navigation branding region'
  nav_main: 'Main navigation region'
  nav_additional: 'Additional navigation region (eg search form, social icons, etc)'
  breadcrumb: Breadcrumbs
  content: 'Main content'
  sidebar_first: 'Sidebar first'
  sidebar_second: 'Sidebar second'
  footer: Footer
