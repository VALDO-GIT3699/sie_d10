            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre de cada año.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los estudiantes que realizan prácticas profesionales por entidad universitaria sector social.\r\nLas prácticas profesionales consisten en actividades de carácter temporal acorde a cada profesión, realizadas por los pasantes, egresados o estudiantes de la Universidad de educación media superior y pregrado. </div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div> Hasta el año 2022 no se reportó el SEMS.\r\nLa información solo se consulta en totalizados por año, debido a los desagregados \"no disponibles\" reportados por algunas entidades universitarias.</div>\r\n   </div>\r\n</div>"
