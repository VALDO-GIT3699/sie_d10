          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Septiembre de cada año.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los planteles que conforman la Red Universitaria: Sistema de Educación Media Superior, Centros Universitarios y Sistema de Universidad Virtual.\r\nSedes CU: hace referencia a las sedes adscritas a los Centros Universitarios, las cuales son: CUAAD: Sede Santa María de Gracia y Sede San Agustín; CUCIÉNEGA: Sede Atotonilco y Sede la Barca; CUCOSTA: Sede Tomatlán; CUCOSTASUR: Sede San Patricio Melaque; CULAGOS: Sede San Juan de los Lagos.\r\nLas escuelas, módulos y extensiones corresponden a los planteles del Sistema de Educación Media Superior.\r\nEl Sistema de Universidad Virtual cuenta con sus instalaciones administrativas en Guadalajara, Jalisco, pero las clases se imparten de manera virtual tanto en Educación Media Superior como Educación Superior.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div></div>\r\n   </div>\r\n</div>"
