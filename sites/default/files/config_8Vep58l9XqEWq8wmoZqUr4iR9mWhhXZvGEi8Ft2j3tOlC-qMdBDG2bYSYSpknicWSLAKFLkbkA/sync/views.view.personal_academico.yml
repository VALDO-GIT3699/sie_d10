            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presenta el personal administrativo de acuerdo a su categoría y entidad universitaria, el cual está conformado por un conjunto de trabajadores que realizan actividades no académicas. Se considera como personal a quienes prestan un servicio en forma personal y subordinada a la Universidad de Guadalajara: personal sindicalizado es todo aquel trabajador que se encuentre agremiado a cualquier organización sindical legalmente constituida como el Sindicato Único de Trabajadores de la Universidad de Guadalajara (SUTUdeG); el personal de confianza realiza funciones de dirección, inspección, vigilancia y fiscalización de carácter general y que no pueden desempeñar actividades propias del personal sindicalizado; dentro del personal de confianza está incluido el personal que desempeña actividades de mandos medios y mandos superiores, éstos son homologables a lo que en la Ley Federal de Trabajo se denomina como directivos.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div>Unidad de medida: Personas/plazas. Se contabilizan plazas pagables tales como interinos, titulares en licencia con goce, etc. El conteo consiste en personas por función, una persona puede desempeñar más de una función siempre y cuando la suma de la carga horaria semanal no exceda 48 horas.</div>\r\n   </div>\r\n</div>"
            format: full_html
          tokenize: false
