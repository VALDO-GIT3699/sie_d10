          admin_label: ''
          plugin_id: text
          empty: false
          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presenta el personal académico asociado de acuerdo a su categoría y tiempo de dedicación: los docentes realizan funciones académicas, promueve y desarrolla el proceso educativo en relación a una currícula determinada, teniendo a su cargo una o varias materias, asimismo son quienes realizan trabajos de investigación y formación de recursos humanos especializados. Los técnicos académicos realizan funciones específicas y especializadas en una materia o área de los programas académicos, de extensión y de servicios técnicos en cualquier dependencia universitaria. Los investigadores son personal académico cuyo trabajo está dedicado principalmente a la investigación, ya sea científica o humanística. Los profesores de asignatura se desempeñan principalmente en la función académica y de acuerdo con la categoría que fije su nombramiento, es remunerado en función del número de horas de clase que imparte, con la posibilidad de impartir una o varias materias, así como ser interino o definitivo.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div>Unidad de medida: Personas/plazas. Se contabilizan plazas pagables tales como interinos, titulares en licencia con goce, etc. El conteo consiste en personas por función, una persona puede desempeñar más de una función siempre y cuando la suma de la carga horaria semanal no exceda 48 horas.</div>\r\n   </div>\r\n</div>"
            format: full_html
          tokenize: false
      display_extenders: {  }
