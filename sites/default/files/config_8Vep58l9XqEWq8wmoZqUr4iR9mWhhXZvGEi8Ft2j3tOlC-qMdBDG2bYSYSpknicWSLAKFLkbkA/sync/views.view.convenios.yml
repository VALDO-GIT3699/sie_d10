          admin_label: ''
          plugin_id: text
          empty: false
          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los convenios vigentes de colaboración académica para la internacionalización, que tiene la Universidad de Guadalajara con instituciones de educación superior nacional o extranjera o una instancia u organismo internacional. Los convenios vigentes son aquellos que hasta la fecha se encuentran en dicho estatus por continente, región, país y tipo.\r\nEl convenio es el acuerdo entre dos o más instituciones que tiene como finalidad establecer los compromisos legales y financieros para llevar a cabo proyectos que sean de mutuo interés entre las entidades que colaboren. Se cuenta con convenios de carácter general y específico, los primeros establecen las bases concretas de trabajo en cualquiera de las áreas que se hayan estipulado en términos generales, y los segundos se desprenden del convenio general para establecer responsabilidades concretas, así como actividades específicas a desarrollarse por un tiempo determinado. Una vez que concluye la actividad específica, el convenio general puede seguir teniendo validez y se pueden realizar tantos convenios específicos como actividades, proyectos particulares o concretos que se lleguen a desarrollar entre las contrapartes. El resultado de estos convenios puede generar recursos humanos para la investigación científica, desarrollo de tecnologías, actividades de innovación, servicios científicos y tecnológicos, transferencias del conocimiento y tecnológico, actividades culturales, entre otros.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div> </div>\r\n   </div>\r\n</div>"
