          id: area
          table: views
          field: area
          relationship: none
          group_type: group
          admin_label: ''
          plugin_id: text
          empty: false
          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los convenios de colaboración académica para la internacionalización, firmados durante el año entre la Universidad de Guadalajara con instituciones de educación superior nacional o extranjera o una instancia u organismo internacional. Los convenios corresponden al periodo de enero a diciembre por continente, región, país y tipo.\r\nLos convenios son acuerdos entre dos o más instituciones que tienen como finalidad establecer los compromisos legales y financieros para llevar a cabo proyectos que sean de mutuo interés entre las entidades que colaboren. Se cuenta con convenios de carácter general y específico, los primeros establecen las bases concretas de trabajo en cualquiera de las áreas que se hayan estipulado, y los segundos se desprenden del convenio general para establecer responsabilidades concretas, así como actividades específicas a desarrollarse por un tiempo determinado. Una vez que concluye la actividad específica, el convenio general puede seguir teniendo validez y se pueden realizar tantos convenios específicos como actividades, proyectos particulares o concretos que se lleguen a desarrollar entre las contrapartes. El resultado de estos convenios puede generar recursos humanos para la investigación científica, desarrollo de tecnologías, actividades de innovación, servicios científicos y tecnológicos, transferencias del conocimiento y tecnológico, actividades culturales, entre otros.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div> </div>\r\n   </div>\r\n</div>"
            format: full_html
          tokenize: false
