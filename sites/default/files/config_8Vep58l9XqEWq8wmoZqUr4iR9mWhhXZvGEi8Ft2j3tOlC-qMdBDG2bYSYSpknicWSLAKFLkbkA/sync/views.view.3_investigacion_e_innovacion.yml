          empty: false
          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los investigadores miembros del Sistema Nacional de Investigadoras e Investigadores (SNII) y del Sistema Nacional de Creadores de Arte (SNCA), por entidad universitaria, nivel de reconocimiento y sexo. <br>\r\nEl SNII tiene por objeto promover y fortalecer, a través de la evaluación, la calidad de la investigación científica y tecnológica, y la innovación que se produce en el país. El Sistema contribuye a la formación y consolidación de investigadores con conocimientos científicos y tecnológicos del más alto nivel como un elemento fundamental para incrementar la cultura, productividad, competitividad y el bienestar social, a su vez, el objeto del SNCA atiende a seguir propiciando la participación de creadores artísticos de talento y excelencia.</div>\r\n   <div class=\"notas_gr_des\"><strong>Notas</strong>\r\n   </div>\r\n</div>"
