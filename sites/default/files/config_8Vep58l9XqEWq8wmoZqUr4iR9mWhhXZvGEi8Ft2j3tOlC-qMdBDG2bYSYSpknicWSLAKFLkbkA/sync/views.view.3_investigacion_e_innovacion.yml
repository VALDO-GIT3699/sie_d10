          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte:  Diciembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los investigadores asociados por entidad universitaria y nivel. Se desglosa en tres categorías y se define la primera categoría como titular a quien tiene la capacidad de formar recursos humanos dentro de los programas académicos, guía o dirige actividades docentes, de investigación, de preservación y extensión de la cultura o éstas entre sí; la segunda es asociado y es quien realiza actividades académicas de docencia, de investigación, de preservación y extensión de la cultura o de éstas entre sí, bajo la guía y supervisión del titular; y la tercera es asistente, quien auxilia en las labores de docencia, de investigación, de preservación y extensión de la cultura o de éstas entre sí. \r\nUnidad de medida: Plazas para académicos de carrera de tiempo completo y medio tiempo.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div></div>\r\n   </div>\r\n</div>"
