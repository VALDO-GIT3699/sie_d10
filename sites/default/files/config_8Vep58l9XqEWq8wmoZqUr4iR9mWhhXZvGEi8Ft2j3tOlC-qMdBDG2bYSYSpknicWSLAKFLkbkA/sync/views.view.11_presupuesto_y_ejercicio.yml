          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los recursos económicos de los ingresos por tipo de fuente de financiamiento, pesos en moneda nacional mexicana. \r\nLos apoyos especiales se refieren a los ingresos extraordinarios otorgados por distintos entes públicos de índole Federal, Estatal y Municipal.\r\nIngresos autogenerados son todos aquellos ingresos que proceden tanto de la utilización directa o concesionada de bienes y de la prestación de servicios de la Universidad de Guadalajara, en áreas académicas y no académicas, como de aportaciones gratuitas y no onerosas, de acuerdo a las Políticas y Normas del Presupuesto de Ingresos y Egresos; puede percibirse por los servicios que presta, por donativos de particulares, por cuotas de inscripción y de exámenes, por organización de actos académicos o por explotación de su patrimonio. Estos ingresos no forman parte de los subsidios federal y estatal.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div>Las cifras están presentadas en pesos corrientes, para facilitar los cálculos y/o la interpretación fueron redondeadas de acuerdo a la metodología “si el decimal es igual o mayor a 5, se redondea al alza”, por ejemplo 73.50 se redondea a 74.</div>\r\n   </div>\r\n</div>"
