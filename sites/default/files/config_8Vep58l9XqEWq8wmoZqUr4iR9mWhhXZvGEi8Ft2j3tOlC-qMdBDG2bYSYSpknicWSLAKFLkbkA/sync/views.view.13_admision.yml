          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Calendario A: 16 de enero al 15 de julio del año respectivo. Calendario B: del 16 de julio del año respectivo al 15 de enero del siguiente año. </div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div> Se presenta el conteo de admitidos a las distintas entidades de la Red Universitaria, tanto de educación media superior, como pregrado y posgrado.\r\nLos admitidos a educación media superior y pregrado son aquellos aspirantes que, al terminar el proceso de selección de primer ingreso, están sobre el puntaje mínimo del examen de admisión y hay cupo disponible para su ingreso.\r\nLos admitidos a posgrados son aquellos aspirantes que, al terminar el proceso de selección de primer ingreso, cumplan con los requisitos que establece el artículo 50 del Reglamento General de Posgrados .</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div></div>\r\n   </div>\r\n</div>"
