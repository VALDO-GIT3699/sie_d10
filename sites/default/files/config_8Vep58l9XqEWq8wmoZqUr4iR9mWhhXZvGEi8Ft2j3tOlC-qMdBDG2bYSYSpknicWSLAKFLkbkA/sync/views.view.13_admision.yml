          relationship: none
          group_type: group
          admin_label: ''
          plugin_id: text
          empty: false
          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Calendario A: 16 de enero al 15 de julio del año respectivo. Calendario B: del 16 de julio del año respectivo al 15 de enero del siguiente año.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presenta el conteo de aspirantes y admitidos a las distintas entidades de la Red Universitaria, tanto de educación media superior, como pregrado y posgrado.\r\nLos aspirantes son aquellos que, habiendo iniciado un trámite de admisión, cumplen con todos los requisitos para aspirar por un lugar de primer ingreso.\r\nEl proceso de aspiración al Sistema de Educación Media Superior (SEMS), se realiza en el calendario B, donde todos los admitidos se dictaminan para los dos calendarios de ingreso, esto es, los estudiantes admitidos en el Calendario B ingresan en agosto, mientras que los estudiantes admitidos en el Calendario A ingresan en enero.\r\nEl total de aspirantes del Sistema de Educación Media Superior (SEMS) en los calendarios A se calcula con base en los no admitidos en el calendario B, considerando únicamente aquellos con el trámite completo.\r\nLos admitidos a educación media superior y pregrado son aquellos aspirantes que, al terminar el proceso de selección de primer ingreso, están sobre el puntaje mínimo del examen de admisión y hay cupo disponible para su ingreso.\r\nLos admitidos a posgrados son aquellos aspirantes que, al terminar el proceso de selección de primer ingreso, cumplan con los requisitos que establece el artículo 50 del Reglamento General de Posgrados.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div></div>\r\n   </div>\r\n</div>"
