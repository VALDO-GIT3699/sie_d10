          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre de cada año.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan las suscripciones de las bases de datos de la Biblioteca Digital, la cual se define como \"institucional\" que mediante el uso de tecnologías digitales adquiere, almacena, conserva, cataloga y ofrece a los usuarios información en forma digital. Ofrece la posibilidad de descargar la información en formato texto, imágenes o multmedia.\r\nBase de datos : Es un conjunto de datos almacenados y estructurados digitalmente según sus características o tipología para ser utilizados o consultados posteriormente por medio de la plataforma https://wdg.biblio.udg.mx o en los recursos informativos suscritos.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div></div>\r\n   </div>\r\n</div>"
