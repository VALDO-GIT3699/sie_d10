            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan las bases de datos suscritas por la Universidad de Guadalajara y las suscritas por el CONRICYT , las cuales se clasifican como bases de datos Revistas a texto completo, Libros electrónicos y Referenciales. Gran parte de su contenido es de acceso abierto.\r\nTodas las bases de datos se adquieren con presupuesto de la Universidad de Guadalajara; el Consorcio Nacional de Recursos de Información Científica y Tecnológica (CONRICYT), solo interviene en las negociaciones para obtener mejores condiciones de compra (precio y calidad de los contenidos) en los recursos digitales científicos y tecnológicos.\r\nBase de datos: es un conjunto de datos estructurados que pertenecen a un mismo contexto y, en cuanto a su función, se utiliza para administrar de forma electrónica grandes cantidades de información.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div>Solo se muestra la información del año más reciente.</div>\r\n   </div>\r\n</div>"
            format: full_html
          tokenize: false
      display_extenders: {  }
    cache_metadata:
      max-age: -1
