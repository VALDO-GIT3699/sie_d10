          plugin_id: text
          empty: false
          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Septiembre del año reportado.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan los estudiantes matrículados reportados en la Estadística 911 de la Secretaría de Educación Pública, activos en la modalidad escolarizada la cual exige presencia permanente y continua del personal académico y estudiantes; se desarrolla primordialmente en espacios áulicos, ubicándose en ciclos escolares determinados institucionalmente y supone tiempos límite de ingreso y egreso con un flujo rápido y la modalidad no escolarizada la cual permite el logro de los objetivos de aprendizaje mediante una relación no presencial, y en la que el vínculo de la docencia y de asesoría se realiza mediante diversos medios impresos y electrónicos. Esta modalidad puede a su vez combinarse con la abierta, lo que flexibiliza los tiempos, o con la semiescolarizada, que delimita ritmos, tiempos y condiciones de trabajo. La SEP categoriza la modalidad dual y mixta como \"no escolarizada\". Los estudiantes tienen los siguientes estatus: activo con registro de al menos un curso, en intercambio, con licencia, en B4 (estudiante irregular condicionado por el artículo 34) y, en carreras médicas, estudiantes de internado y en servicio social.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div> </div>\r\n</div>"
            format: full_html
          tokenize: false
