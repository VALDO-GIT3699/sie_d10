            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Planteles: Diciembre de cada año. Matrícula: Septiembre de cada año.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presenta la matrícula en planteles con registro en el Padrón de Calidad del Sistema Nacional de Educación Media Superior.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div>A partir del 12 de abril de 2019 se presentó la última actualización de los planteles miembros del Padrón de Calidad del Sistema Nacional de Educación Media Superior (PC-SINEMS) por parte del Consejo para la Evaluación de la Educación del Tipo Medio Superior (COPEEMS), el cual ya ha sido disuelto; sin embargo se sigue reportando la matrícula del ciclo en curso de dichos planteles.</div>\r\n   </div>\r\n</div>"
