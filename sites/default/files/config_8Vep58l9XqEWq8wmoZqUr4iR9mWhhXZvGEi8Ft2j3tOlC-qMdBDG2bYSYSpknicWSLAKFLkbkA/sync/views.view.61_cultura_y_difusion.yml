          content:
            value: "<div class=\"notas_grafico\">\r\n   <div class=\"fecha-corte\">Fecha de corte: Diciembre de cada año.</div>\r\n   <div class=\"notas_gr_titulo\">Descripción</div>\r\n   <div>Se presentan las piezas registradas como patrimonio artístico y cultural en los recintos y entidades universitarias que forman parte de la Red Universitaria de acuerdo a su adscripción, independientemente de su ubicación y/o exhibición.\r\nEl Patrimonio cultural y artístico es el conjunto de bienes tangibles, que constituyen la herencia de un grupo humano, que refuerzan emocionalmente su sentido de comunidad con una identidad propia y que son percibidos por otros como característicos; como producto de la creatividad humana, se hereda, se transmite, se modifica y optimiza de individuo a individuo y de generación a generación.</div>\r\n   <div class=\"notas_gr_des\">Notas del gráfico</div>\r\n   <div>Hasta el año 2021, la información no se reportó por entidad universitaria; asimismo se cambió el rubro Placas conmemorativas por Grabados y Fotografías históricas por Fotografías.</div>\r\n   </div>\r\n</div>"
